name: Release on tag

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist)'
        required: true
      source_ref:
        description: 'Source ref to build from (defaults to the tag). Set to a branch name to validate workflow changes that are not yet on the tag.'
        required: false
        default: ''
      upload:
        description: 'Upload built artifacts to the GitHub release if it already exists (default: false)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      source_ref: ${{ steps.meta.outputs.source_ref }}
    steps:
      - name: Resolve tag, version, and source ref
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            SOURCE_REF="${{ github.event.inputs.source_ref }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            SOURCE_REF=""
          fi
          if [ -z "$SOURCE_REF" ]; then
            SOURCE_REF="$TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_suffix: win
            build_cmd: powershell -ExecutionPolicy Bypass -File tools/build_windows.ps1 -Clean
          - os: macos-latest
            os_suffix: mac
            build_cmd: bash tools/build_unix.sh --clean
          - os: ubuntu-latest
            os_suffix: linux
            build_cmd: bash tools/build_unix.sh --clean
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-meta.outputs.source_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Linux Qt offscreen system deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0 libdbus-1-3

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build portable bundle
        run: ${{ matrix.build_cmd }}

      - name: Resolve bundle path
        id: bundle
        shell: bash
        run: |
          NAME=$(python -c "from src.app_metadata import get_release_bundle_name; print(get_release_bundle_name('${{ matrix.os_suffix }}'))")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "zip=dist/release/$NAME.zip" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.bundle.outputs.name }}
          path: ${{ steps.bundle.outputs.zip }}
          if-no-files-found: error

  publish:
    needs: [resolve-meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-meta.outputs.source_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release zips
        id: stage
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f -name '*.zip' -exec cp {} release-assets/ \;
          ls -la release-assets
          COUNT=$(ls -1 release-assets/*.zip 2>/dev/null | wc -l)
          if [ "$COUNT" -lt 3 ]; then
            echo "Expected 3 release zips, found $COUNT" >&2
            ls -la release-assets >&2
            exit 1
          fi

      - name: Extract release notes for tag
        run: |
          python tools/extract_release_notes.py "${{ needs.resolve-meta.outputs.version }}" RELEASE_NOTES.md > /tmp/notes.md
          cat /tmp/notes.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_TO_EXISTING: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload == 'true') }}
        shell: bash
        run: |
          TAG="${{ needs.resolve-meta.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            if [ "$UPLOAD_TO_EXISTING" = "true" ]; then
              echo "Uploading assets to existing release $TAG (clobbering same-name files)"
              gh release upload "$TAG" release-assets/*.zip --clobber
            else
              echo "Skipping upload to existing release (workflow_dispatch with upload=false)"
            fi
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG \"Chemistry Tool\"" \
            --notes-file /tmp/notes.md \
            release-assets/*.zip
