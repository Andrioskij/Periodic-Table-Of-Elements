name: Release on tag

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build portable bundle
        shell: pwsh
        run: ./tools/build_windows.ps1 -Clean

      - name: Resolve tag and bundle
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          NAME=$(python -c "from src.app_metadata import get_release_bundle_name; print(get_release_bundle_name())")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "zip=dist/release/$NAME.zip" >> $GITHUB_OUTPUT

      - name: Extract release notes for tag
        shell: bash
        run: |
          python tools/extract_release_notes.py "${{ steps.meta.outputs.version }}" RELEASE_NOTES.md > /tmp/notes.md
          cat /tmp/notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG \"Chemistry Tool\"" \
            --notes-file /tmp/notes.md \
            "${{ steps.meta.outputs.zip }}"
