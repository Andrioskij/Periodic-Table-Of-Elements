name: Windows CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Qt offscreen system deps
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0 libdbus-1-3

      - name: Upgrade pip and install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt

      - name: Lint with ruff
        run: python -m ruff check .

      - name: Run automated test suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/ -q

  test-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Lint with ruff
        run: python -m ruff check .

      - name: Run automated test suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/ -q

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build portable Windows release
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File tools/build_windows.ps1 -Clean

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: PeriodicTableApp-release
          path: dist/release/*.zip
